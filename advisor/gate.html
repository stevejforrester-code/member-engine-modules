<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retention Advisor — Member Engine</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0d0d0d;
  --white: #f8f7f4;
  --pink: #FF1493;
  --lime: #39FF14;
  --yellow: #FFE600;
  --display: 'Bebas Neue', sans-serif;
  --body: 'DM Sans', sans-serif;
}

html, body {
  background: var(--black);
  color: var(--white);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 60px;
  background: var(--black);
  border-bottom: 3px solid var(--pink);
}
.nav-logo {
  font-family: var(--display);
  font-size: 22px; letter-spacing: 0.12em;
  color: var(--white); text-decoration: none;
}
.nav-logo .dot { color: var(--pink); }

.gate-wrap {
  min-height: calc(100vh - 60px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
  background: var(--black);
}

.gate-card {
  max-width: 480px; width: 100%;
  background: #111;
  border: 3px solid var(--pink);
  padding: 48px;
}

.gate-eyebrow {
  font-family: var(--display); font-size: 11px;
  letter-spacing: 0.25em; color: var(--pink);
  margin-bottom: 16px;
}

.gate-heading {
  font-family: var(--display);
  font-size: clamp(40px, 8vw, 64px);
  line-height: 0.95; margin-bottom: 20px;
  color: var(--white);
}

.gate-sub {
  font-size: 15px; font-weight: 300;
  line-height: 1.7; color: #aaa;
  margin-bottom: 32px;
}

.gate-input {
  width: 100%;
  background: #0d0d0d; border: 2px solid #333;
  color: var(--white); font-family: var(--body);
  font-size: 18px; padding: 16px 20px;
  outline: none; letter-spacing: 0.1em;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.gate-input:focus { border-color: var(--pink); }
.gate-input::placeholder { color: #333; letter-spacing: 0.05em; font-size: 15px; }

.gate-btn {
  width: 100%;
  background: var(--pink); color: var(--black);
  font-family: var(--display); font-size: 20px;
  letter-spacing: 0.12em; border: none;
  padding: 18px; cursor: pointer;
  transition: background 0.2s;
}
.gate-btn:hover { background: var(--white); }

.gate-error {
  font-size: 13px; color: var(--pink);
  margin-top: 12px; display: none;
  font-weight: 400; letter-spacing: 0.05em;
}
.gate-error.visible { display: block; }
</style>
</head>
<body>

<nav>
  <a href="https://memberengine.co" class="nav-logo">MEMBER<span class="dot">.</span>ENGINE</a>
</nav>

<div class="gate-wrap">
  <div class="gate-card">
    <div class="gate-eyebrow">RETENTION ADVISOR</div>
    <div class="gate-heading">ENTER YOUR<br>PASSWORD.</div>
    <p class="gate-sub">
      Your password was in the confirmation email when you purchased.
      If you have lost it, reply to that email and we will sort you out.
    </p>
    <input
      type="password"
      class="gate-input"
      id="password-input"
      placeholder="Enter your password"
      autocomplete="current-password"
    >
    <button class="gate-btn" id="unlock-btn">UNLOCK ADVISOR</button>
    <div class="gate-error" id="gate-error">
      That is not right. Check the email and try again.
    </div>
  </div>
</div>

<script>
  const CORRECT = 'advisor2026';
  const SESSION_KEY = 'me_advisor_access';

  // Already unlocked this session
  if (sessionStorage.getItem(SESSION_KEY) === 'true') {
    window.location.href = 'index.html';
  }

  function tryUnlock() {
    const val = document.getElementById('password-input').value.trim();
    if (val === CORRECT) {
      sessionStorage.setItem(SESSION_KEY, 'true');
      window.location.href = 'index.html';
    } else {
      document.getElementById('gate-error').classList.add('visible');
      document.getElementById('password-input').style.borderColor = 'var(--pink)';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }

  document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryUnlock();
  });
</script>

</body>
</html>
