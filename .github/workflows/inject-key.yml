name: Inject API Key

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key into advisor
        run: |
          sed -i "s|YOUR_API_KEY_HERE|${{ secrets.ANTHROPIC_API_KEY }}|g" advisor/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
